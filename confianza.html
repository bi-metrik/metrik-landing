<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cómo Trabajamos | MéTRIK</title>
    <meta name="description" content="Trabajamos con confianza. Claridad en cómo manejamos tu información y cómo trabajamos contigo.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://hcxyowictswpibzqxwyj.supabase.co/storage/v1/object/public/metrik-landing/Isotipo_Mk.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://hcxyowictswpibzqxwyj.supabase.co/storage/v1/object/public/metrik-landing/Isotipo_Mk.png">
    <link rel="apple-touch-icon" href="https://hcxyowictswpibzqxwyj.supabase.co/storage/v1/object/public/metrik-landing/Isotipo_Mk.png">
    <link rel="shortcut icon" href="https://hcxyowictswpibzqxwyj.supabase.co/storage/v1/object/public/metrik-landing/Isotipo_Mk.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const kebabToPascal = (str) => {
            return str.split('-').map(part => {
                if (!isNaN(part)) return part;
                return part.charAt(0).toUpperCase() + part.slice(1);
            }).join('');
        };

        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const pascalName = kebabToPascal(name);
                    const iconData = window.lucide.icons[pascalName];
                    if (iconData) {
                        const iconElement = window.lucide.createElement(iconData);
                        if (iconElement) {
                            iconElement.setAttribute('width', size);
                            iconElement.setAttribute('height', size);
                            if (fill !== "none") {
                                iconElement.setAttribute('fill', fill);
                            }
                            iconRef.current.appendChild(iconElement);
                        }
                    }
                }
            }, [name, size, fill]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const useScrollVisibility = () => {
                const [isVisible, setIsVisible] = useState(false);
                const domRef = useRef();

                useEffect(() => {
                    const observer = new IntersectionObserver(entries => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) setIsVisible(true);
                        });
                    });
                    const currentElement = domRef.current;
                    if (currentElement) observer.observe(currentElement);
                    return () => {
                        if (currentElement) observer.unobserve(currentElement);
                    };
                }, []);

                return [isVisible, domRef];
            };

            const FadeInSection = ({ children, className = "", delay = '0' }) => {
                const [isVisible, domRef] = useScrollVisibility();
                return (
                    <div
                        ref={domRef}
                        className={`transition-all duration-1000 ease-out transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'} ${className}`}
                        style={{ transitionDelay: `${delay}ms` }}
                    >
                        {children}
                    </div>
                );
            };

            const CalendlyModal = () => {
                if (!isModalOpen) return null;
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                        <div className="bg-white rounded-xl w-full max-w-4xl h-[90vh] overflow-hidden relative shadow-2xl flex flex-col">
                            <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                                <h3 className="font-montserrat font-bold text-lg text-gray-800">Agenda tu diagnóstico gratis</h3>
                                <button onClick={() => setIsModalOpen(false)} className="p-2 hover:bg-gray-200 rounded-full transition-colors">
                                    <Icon name="x" size={24} className="text-gray-500" />
                                </button>
                            </div>
                            <div className="flex-1 w-full h-full bg-white relative">
                                <iframe src="https://calendly.com/mauricio-moreno-metrik/30min?hide_event_type_details=1&hide_gdpr_banner=1&primary_color=10b981" width="100%" height="100%" frameBorder="0" title="Calendly Scheduling" className="absolute inset-0 w-full h-full"></iframe>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="font-sans text-[#1A1A1A] antialiased">
                    <CalendlyModal />

                    {/* Header */}
                    <header className={`fixed top-0 w-full z-50 bg-white py-3 ${scrolled ? 'shadow-md' : ''}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <a href="/" className="flex items-center gap-2">
                                <img src="https://hcxyowictswpibzqxwyj.supabase.co/storage/v1/object/public/metrik-landing/Logo_Mk.png" alt="MéTRIK Logo" className="h-10 md:h-12 w-auto object-contain" />
                            </a>
                            <a href="/" className="flex items-center gap-2 text-gray-600 hover:text-[#10B981] transition-colors font-montserrat font-medium text-sm">
                                <Icon name="arrow-left" size={18} />
                                Volver al inicio
                            </a>
                        </div>
                    </header>

                    <main>
                        {/* Hero Section */}
                        <section className="min-h-[50vh] flex items-center justify-center px-6 pt-32 pb-16 bg-gradient-to-b from-[#1A1A1A] to-[#2d2d2d] text-white">
                            <div className="max-w-4xl mx-auto text-center">
                                <FadeInSection>
                                    <h1 className="font-montserrat font-bold text-4xl md:text-5xl leading-tight mb-6">
                                        Trabajamos con <span className="text-[#10B981]">Confianza</span>
                                    </h1>
                                    <p className="font-montserrat text-xl text-gray-300 max-w-2xl mx-auto">
                                        Claridad en cómo manejamos tu información y cómo trabajamos contigo.
                                    </p>
                                </FadeInSection>
                            </div>
                        </section>

                        {/* Section 1: Tus Datos Están Seguros */}
                        <section id="datos" className="py-24 px-6 bg-white">
                            <div className="container mx-auto max-w-4xl">
                                <FadeInSection className="text-center mb-12">
                                    <h2 className="font-montserrat font-bold text-3xl md:text-4xl text-[#1A1A1A] mb-4 flex items-center justify-center gap-3">
                                        <span className="text-3xl">🔒</span> Tus Datos Están Seguros
                                    </h2>
                                </FadeInSection>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                                    <FadeInSection className="text-center p-6">
                                        <h3 className="font-montserrat font-bold text-lg text-[#1A1A1A] mb-3">Cumplimiento Legal</h3>
                                        <p className="text-gray-600">Operamos bajo la Ley 1581 de 2012 de Protección de Datos Personales.</p>
                                    </FadeInSection>
                                    <FadeInSection delay="100" className="text-center p-6">
                                        <h3 className="font-montserrat font-bold text-lg text-[#1A1A1A] mb-3">Confidencialidad</h3>
                                        <p className="text-gray-600">Firmamos compromiso de confidencialidad antes de empezar. Lo tuyo es tuyo.</p>
                                    </FadeInSection>
                                    <FadeInSection delay="200" className="text-center p-6">
                                        <h3 className="font-montserrat font-bold text-lg text-[#1A1A1A] mb-3">Tu información, tu decisión</h3>
                                        <p className="text-gray-600">Al finalizar, tú decides: te la entregamos completa o la eliminamos.</p>
                                    </FadeInSection>
                                </div>

                                {/* AFI Custodia Section */}
                                <FadeInSection className="bg-[#1A1A1A] text-white p-8 rounded-2xl mb-8">
                                    <div className="flex flex-col md:flex-row items-center gap-8">
                                        <div className="flex-1 text-center md:text-left">
                                            <div className="flex items-center justify-center md:justify-start gap-2 mb-4">
                                                <Icon name="shield-check" size={24} className="text-[#10B981]" />
                                                <h3 className="font-montserrat font-bold text-xl">Protección de Datos Respaldada</h3>
                                            </div>
                                            <p className="text-gray-300 leading-relaxed">
                                                Trabajamos en alianza con <strong className="text-white">AFI International Group</strong>, expertos en cumplimiento normativo y protección de datos personales en Colombia.
                                            </p>
                                            <p className="text-[#10B981] font-medium mt-3">Tu información está en buenas manos.</p>
                                        </div>
                                        <a href="https://www.afiinternationalgroup.com" target="_blank" rel="noopener noreferrer" className="shrink-0 hover:opacity-80 transition-opacity">
                                            <img src="https://hcxyowictswpibzqxwyj.supabase.co/storage/v1/object/public/metrik-landing/Custodia_AFI.png" alt="Sello Custodia AFI International Group" className="h-28 w-auto" />
                                        </a>
                                    </div>
                                </FadeInSection>

                                <FadeInSection className="bg-gray-50 p-8 rounded-xl text-center">
                                    <p className="text-gray-600 mb-6">
                                        <strong>Responsable de datos:</strong><br />
                                        Mauricio Moreno | mauricio.moreno@metrik.com.co
                                    </p>
                                    <a href="/privacidad" className="inline-flex items-center gap-2 bg-[#1A1A1A] text-white px-6 py-3 rounded-lg font-medium hover:bg-gray-800 transition-colors mb-8">
                                        <Icon name="file-text" size={18} />
                                        Ver Política Completa
                                    </a>

                                    <div className="pt-6 border-t border-gray-200">
                                        <p className="text-gray-500 text-sm mb-4">Empresa comprometida con el medio ambiente</p>
                                        <a href="https://zapsign.co/es/?utm_source=sustentabilidade" target="_blank" rel="noopener noreferrer" className="inline-block hover:opacity-80 transition-opacity">
                                            <img src="https://app.zapsign.co/assets/img/logo/zapsignSustainableLogos/sustainableBlackLogoES.png" alt="Sello de sostenibilidad ZapSign" className="h-20 w-auto mx-auto" />
                                        </a>
                                    </div>
                                </FadeInSection>
                            </div>
                        </section>

                        {/* Section 2: Cómo Trabajamos */}
                        <section className="py-24 px-6 bg-[#F9FAFB]">
                            <div className="container mx-auto max-w-5xl">
                                <FadeInSection className="text-center mb-12">
                                    <h2 className="font-montserrat font-bold text-3xl md:text-4xl text-[#1A1A1A] mb-4 flex items-center justify-center gap-3">
                                        <span className="text-3xl">📋</span> Cómo Trabajamos
                                    </h2>
                                </FadeInSection>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    {[
                                        { num: "1", title: "Diagnóstico Gratis (30 min)", desc: "Conversamos. Entendemos dónde estás hoy. Sin compromiso." },
                                        { num: "2", title: "Propuesta a tu Medida", desc: "Según tu situación, te proponemos el camino más corto hacia la claridad. Precio fijo. Plazo definido. Sin sorpresas." },
                                        { num: "3", title: "Construcción", desc: "Trabajamos con tus datos. Tú ves el avance." },
                                        { num: "4", title: "Entrega", desc: "Tu claridad funcionando + capacitación + soporte." }
                                    ].map((step, index) => (
                                        <FadeInSection key={index} delay={index * 100} className="bg-white p-6 rounded-xl border border-gray-100 text-center hover:shadow-lg transition-all">
                                            <div className="w-12 h-12 bg-[#10B981] rounded-full flex items-center justify-center mx-auto mb-4 text-white font-bold text-xl">
                                                {step.num}
                                            </div>
                                            <h3 className="font-montserrat font-bold text-lg text-[#1A1A1A] mb-3">{step.title}</h3>
                                            <p className="text-gray-600 text-sm">{step.desc}</p>
                                        </FadeInSection>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Section 3: Cada Negocio es Diferente */}
                        <section className="py-24 px-6 bg-white">
                            <div className="container mx-auto max-w-5xl">
                                <FadeInSection className="text-center mb-12">
                                    <h2 className="font-montserrat font-bold text-3xl md:text-4xl text-[#1A1A1A] mb-4 flex items-center justify-center gap-3">
                                        <span className="text-3xl">🎯</span> Cada Negocio es Diferente
                                    </h2>
                                </FadeInSection>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                                    <FadeInSection className="bg-gray-50 p-8 rounded-xl">
                                        <h3 className="font-montserrat font-bold text-lg text-[#1A1A1A] mb-3">¿Operas de memoria?</h3>
                                        <p className="text-gray-600">Te ayudamos a construir la estructura desde cero.</p>
                                    </FadeInSection>
                                    <FadeInSection delay="100" className="bg-gray-50 p-8 rounded-xl">
                                        <h3 className="font-montserrat font-bold text-lg text-[#1A1A1A] mb-3">¿Tienes datos regados en Excel, WhatsApp, cuadernos?</h3>
                                        <p className="text-gray-600">Los organizamos y convertimos en claridad.</p>
                                    </FadeInSection>
                                    <FadeInSection delay="200" className="bg-gray-50 p-8 rounded-xl">
                                        <h3 className="font-montserrat font-bold text-lg text-[#1A1A1A] mb-3">¿Ya tienes sistemas pero no ves nada claro?</h3>
                                        <p className="text-gray-600">Conectamos lo que tienes y te damos las respuestas.</p>
                                    </FadeInSection>
                                </div>

                                <FadeInSection className="text-center">
                                    <p className="text-gray-600 italic">En el diagnóstico identificamos tu escenario y te proponemos la solución exacta.</p>
                                </FadeInSection>
                            </div>
                        </section>

                        {/* Section 4: Qué Siempre Incluye */}
                        <section className="py-24 px-6 bg-[#F9FAFB]">
                            <div className="container mx-auto max-w-3xl">
                                <FadeInSection className="text-center mb-12">
                                    <h2 className="font-montserrat font-bold text-3xl md:text-4xl text-[#1A1A1A] mb-4 flex items-center justify-center gap-3">
                                        <span className="text-3xl">✅</span> Qué Siempre Incluye
                                    </h2>
                                </FadeInSection>

                                <FadeInSection className="bg-white p-8 rounded-xl shadow-sm">
                                    <div className="space-y-4">
                                        {[
                                            "Entregable 100% tuyo, sin licencias mensuales",
                                            "Capacitación para ti y tu equipo",
                                            "Soporte post-entrega",
                                            "Factura electrónica DIAN"
                                        ].map((item, index) => (
                                            <div key={index} className="flex items-center gap-3">
                                                <span className="text-[#10B981]"><Icon name="check" size={20} /></span>
                                                <span className="text-gray-700">{item}</span>
                                            </div>
                                        ))}
                                    </div>
                                </FadeInSection>
                            </div>
                        </section>

                        {/* Section 5: Importante */}
                        <section className="py-24 px-6 bg-white">
                            <div className="container mx-auto max-w-3xl">
                                <FadeInSection className="text-center mb-12">
                                    <h2 className="font-montserrat font-bold text-3xl md:text-4xl text-[#1A1A1A] mb-4 flex items-center justify-center gap-3">
                                        <span className="text-3xl">⚠️</span> Importante
                                    </h2>
                                </FadeInSection>

                                <FadeInSection className="bg-amber-50 border border-amber-200 p-8 rounded-xl">
                                    <p className="text-gray-700 mb-4">
                                        La calidad de tus respuestas depende de tus datos.<br />
                                        Si hay información incompleta, te ayudamos a identificar qué falta y cómo construirla.
                                    </p>
                                    <p className="text-gray-700">
                                        <strong>No somos contadores. No reemplazamos tu contabilidad.</strong><br />
                                        Te damos claridad sobre lo que tus números dicen.
                                    </p>
                                </FadeInSection>
                            </div>
                        </section>

                        {/* CTA Final */}
                        <section className="py-24 px-6 bg-[#1A1A1A] text-white">
                            <div className="container mx-auto max-w-3xl text-center">
                                <FadeInSection>
                                    <h2 className="font-montserrat font-bold text-3xl md:text-4xl mb-8">
                                        ¿Empezamos?
                                    </h2>
                                    <button onClick={() => setIsModalOpen(true)} className="bg-[#10B981] text-white px-10 py-4 rounded-xl font-bold text-xl hover:bg-emerald-400 transition-all duration-300 shadow-lg">
                                        Agendar Diagnóstico Gratis - 30 min
                                    </button>
                                </FadeInSection>
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="bg-white py-12 border-t border-gray-100">
                        <div className="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex flex-col items-center md:items-start">
                                <img src="https://hcxyowictswpibzqxwyj.supabase.co/storage/v1/object/public/metrik-landing/Logo_Mk.png" alt="MéTRIK Logo" className="h-8 md:h-10 w-auto object-contain opacity-80 mb-2" />
                            </div>
                            <div className="flex flex-col md:flex-row gap-6 md:gap-10 items-center">
                                <a href="/" className="text-gray-500 hover:text-[#10B981] transition-colors text-sm font-medium">Inicio</a>
                                <a href="/privacidad" className="text-gray-500 hover:text-[#10B981] transition-colors text-sm font-medium">Política de Privacidad</a>
                                <a href="https://wa.me/573159509103" className="text-gray-500 hover:text-[#10B981] transition-colors text-sm font-medium">Contacto</a>
                            </div>
                        </div>

                        {/* Redes Sociales */}
                        <div className="flex justify-center gap-6 mt-8">
                            <a href="https://www.linkedin.com/company/m%C3%A9trik/" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-[#10B981] transition-colors" aria-label="LinkedIn">
                                <Icon name="linkedin" size={22} />
                            </a>
                            <a href="https://www.instagram.com/metrik.negocios" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-[#10B981] transition-colors" aria-label="Instagram">
                                <Icon name="instagram" size={22} />
                            </a>
                            <a href="https://www.tiktok.com/@metrik.negocios" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-[#10B981] transition-colors" aria-label="TikTok">
                                <svg className="w-[22px] h-[22px]" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
                                </svg>
                            </a>
                        </div>

                        <div className="text-center mt-8 text-xs text-gray-400 font-montserrat">
                            © 2025 MéTRIK | Bogotá, Colombia
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
